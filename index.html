<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sarili — Face Scan</title>
<style>
  :root {
    --washi:     #f5f0e8;
    --sumi:      #1a1612;
    --aged-gold: #b8963e;
    --stone:     #8c8070;
    --forest:    #2d3d2e;
    --error:     #cc4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--washi);
    color: var(--sumi);
    font-family: system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100%;
    padding: 24px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ---- Screens ---- */
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  .center { justify-content: center; align-items: center; text-align: center; gap: 20px; }

  .wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 38px;
    letter-spacing: 2px;
  }

  .tagline { color: var(--stone); font-size: 16px; }
  .note { color: var(--stone); font-size: 13px; }
  .note.small { font-size: 12px; }

  .instruction {
    font-size: 17px;
    text-align: center;
    line-height: 1.4;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- Buttons ---- */
  button {
    font-family: inherit;
    font-size: 16px;
    width: 100%;
    padding: 16px;
    background: var(--sumi);
    color: var(--washi);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  button.secondary {
    background: transparent;
    color: var(--sumi);
    border: 1px solid var(--sumi);
  }
  button:active { opacity: 0.85; }

  /* ---- Camera stage ---- */
  #stage {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);   /* mirror front camera */
  }
  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* face oval guide */
  .oval-guide {
    position: absolute;
    left: 50%;
    top: 48%;
    transform: translate(-50%, -50%);
    width: 58%;
    height: 74%;
    border: 1px solid var(--aged-gold);
    border-radius: 50%;
    pointer-events: none;
    transition: border-color 0.2s;
  }
  .oval-guide.lost { border-color: var(--error); }

  /* turn arrow */
  .arrow {
    position: absolute;
    top: 50%;
    font-size: 44px;
    color: var(--aged-gold);
    pointer-events: none;
    animation: nudge 1.1s ease-in-out infinite;
  }
  .arrow.left  { left: 12px;  transform: translateY(-50%); }
  .arrow.right { right: 12px; transform: translateY(-50%); }
  @keyframes nudge {
    0%,100% { opacity: 0.35; }
    50%     { opacity: 1; }
  }

  /* progress */
  .progress-wrap { margin-top: 4px; }
  .progress-label { font-size: 14px; color: var(--stone); margin-bottom: 8px; text-align: center; }
  .track {
    width: 100%;
    height: 4px;
    background: var(--stone);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0.5;
  }
  .track-fill {
    height: 100%;
    width: 0%;
    background: var(--aged-gold);
    transition: width 0.15s linear;
  }
  .step-dots { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--stone); opacity: 0.4; }
  .dot.done { background: var(--aged-gold); opacity: 1; }
  .dot.active { background: var(--sumi); opacity: 1; }

  /* ---- Results ---- */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    row-gap: 14px;
    column-gap: 12px;
    align-items: baseline;
    margin: 8px 0 24px;
  }
  .results-grid .label { color: var(--stone); font-size: 14px; }
  .results-grid .value {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 22px;
    text-align: right;
  }
  .reco {
    background: var(--forest);
    color: var(--washi);
    padding: 16px;
    border-radius: 4px;
    text-align: center;
    font-size: 16px;
    margin-bottom: 24px;
  }
  .reco .sub { display: block; font-size: 13px; opacity: 0.85; margin-top: 4px; }

  .stack { display: flex; flex-direction: column; gap: 12px; }
  .grow { flex: 1; }
  .heading { font-size: 20px; font-weight: 600; margin-bottom: 4px; }

  /* ---- Debug ---- */
  #debug {
    display: none;
    margin-top: 16px;
    padding: 12px;
    background: #00000010;
    border: 1px solid var(--stone);
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--sumi);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #debug.on { display: block; }

  /* ---- Fatal error ---- */
  #fatal {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--washi);
    padding: 24px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 16px;
    z-index: 10;
  }
  #fatal.on { display: flex; }
</style>
</head>
<body>
<div id="app">

  <!-- Screen 1: Welcome -->
  <section class="screen center active" id="screen-welcome">
    <div class="grow"></div>
    <div class="wordmark">SARILI</div>
    <div class="tagline">Measure your face for a perfect fit</div>
    <div class="grow"></div>
    <div class="stack" style="width:100%">
      <button id="btn-start">Start scan</button>
      <div class="note">Allow camera access when prompted</div>
    </div>
  </section>

  <!-- Screen 2-5: Camera (shared stage) -->
  <section class="screen" id="screen-capture">
    <div id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
      <div class="oval-guide" id="oval"></div>
      <div class="arrow left"  id="arrow-left"  style="display:none">‹</div>
      <div class="arrow right" id="arrow-right" style="display:none">›</div>
    </div>
    <div class="instruction" id="instruction">Position your face in the frame</div>
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">&nbsp;</div>
      <div class="track"><div class="track-fill" id="track-fill"></div></div>
      <div class="step-dots" id="dots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
    <div id="debug"></div>
  </section>

  <!-- Screen 6: Results -->
  <section class="screen" id="screen-results">
    <div class="heading">Your measurements</div>
    <div class="results-grid" id="results-grid"></div>
    <div class="reco" id="reco"></div>
    <div class="stack">
      <button class="secondary" id="btn-again">Scan again</button>
      <div class="note small">Measurements are estimates. Clinical validation recommended for prescription lenses.</div>
    </div>
    <div id="debug-results"></div>
  </section>

  <!-- Fatal error overlay -->
  <div id="fatal">
    <div class="wordmark" style="font-size:24px">SARILI</div>
    <div class="instruction" id="fatal-msg"></div>
    <button class="secondary" id="btn-retry" style="max-width:220px">Refresh</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
(function () {
  "use strict";

  const DEBUG = new URLSearchParams(location.search).get("debug") === "true";

  // ---- Constants ----
  // Scale reference: human horizontal visible iris diameter (HVID) is ~11.7mm and
  // remarkably constant across adults (~±0.5mm), independent of camera distance.
  // Using it as the real-world ruler makes face width an actual measurement rather
  // than a value fixed by assumption (the old 140mm face-width method was circular).
  const IRIS_DIAMETER_MM = 11.7;
  const BRIDGE_HEIGHT_OFFSET = 3.0;    // frames sit proud of skin
  const FRAMES_PER_STEP = 30;
  const BBOX_TOLERANCE = 0.15;         // discard if bbox area deviates >15% from median
  const FACE_DETECT_TIMEOUT_MS = 5000;

  // landmark indices
  const LM = {
    leftTemple: 234, rightTemple: 454,
    leftIris: 468, rightIris: 473,
    leftInnerEye: 133, rightInnerEye: 362,
    noseTip: 4,
  };

  // Iris landmarks (require refineLandmarks). Each iris is a center + 4 ring points.
  // Left iris:  468 center, 469-472 ring.  Right iris: 473 center, 474-477 ring.
  const IRIS = {
    left:  { center: 468, ring: [469, 470, 471, 472] },
    right: { center: 473, ring: [474, 475, 476, 477] },
  };

  // ---- DOM ----
  const el = (id) => document.getElementById(id);
  const screens = {
    welcome: el("screen-welcome"),
    capture: el("screen-capture"),
    results: el("screen-results"),
  };
  const videoEl = el("video");
  const overlay = el("overlay");
  const ctx = overlay.getContext("2d");
  const oval = el("oval");
  const instruction = el("instruction");
  const progressLabel = el("progress-label");
  const trackFill = el("track-fill");
  const dots = el("dots").children;
  const arrowLeft = el("arrow-left");
  const arrowRight = el("arrow-right");
  const debugBox = el("debug");
  if (DEBUG) debugBox.classList.add("on");

  function showScreen(name) {
    Object.values(screens).forEach((s) => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function fatal(msg) {
    el("fatal-msg").textContent = msg;
    el("fatal").classList.add("on");
  }

  // ---- Geometry helpers ----
  function toPx(lm, w, h) { return { x: lm.x * w, y: lm.y * h }; }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function bboxArea(landmarks, w, h) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of landmarks) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    return (maxX - minX) * w * (maxY - minY) * h;
  }

  function median(arr) {
    const s = [...arr].sort((a, b) => a - b);
    const m = Math.floor(s.length / 2);
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  }

  // Head turn estimate: ratio of nose->leftTemple vs nose->rightTemple horizontal distance.
  // ~1.0 = frontal. <1 = turned left (in mirrored view), >1 = turned right.
  function turnRatio(landmarks, w) {
    const nose = landmarks[LM.noseTip].x * w;
    const lt = landmarks[LM.leftTemple].x * w;
    const rt = landmarks[LM.rightTemple].x * w;
    const dl = Math.abs(nose - lt);
    const dr = Math.abs(nose - rt);
    const denom = Math.max(dl, dr) || 1;
    return Math.min(dl, dr) / denom; // 1.0 frontal, →0 strong turn
  }

  // Diameter of one iris circle in pixels: 2x the mean radius from the iris
  // center to its 4 ring points. Using the whole ring is more robust to head
  // tilt and per-landmark jitter than a single horizontal chord.
  function singleIrisDiameterPx(landmarks, eye, w, h) {
    const c = landmarks[eye.center];
    if (!c) return null;
    const center = toPx(c, w, h);
    let sum = 0, n = 0;
    for (const idx of eye.ring) {
      const lm = landmarks[idx];
      if (!lm) continue;
      sum += dist(center, toPx(lm, w, h));
      n++;
    }
    if (!n) return null;
    return 2 * (sum / n); // diameter = 2 * mean radius
  }

  // Iris diameter in pixels, averaged across both eyes.
  // Falls back to a single eye if one iris's landmarks are missing.
  function irisDiameterPx(landmarks, w, h) {
    const dl = singleIrisDiameterPx(landmarks, IRIS.left, w, h);
    const dr = singleIrisDiameterPx(landmarks, IRIS.right, w, h);
    const vals = [dl, dr].filter((v) => v && v > 0);
    if (!vals.length) return null;
    return vals.reduce((s, v) => s + v, 0) / vals.length;
  }

  // ---- Per-frame raw measurement (pixel + mm) ----
  function measureFrame(landmarks, w, h) {
    const p = (i) => toPx(landmarks[i], w, h);

    // Scale comes from the iris, not the face width.
    const irisPx = irisDiameterPx(landmarks, w, h);
    if (!irisPx || irisPx <= 0) return null;
    const scale = IRIS_DIAMETER_MM / irisPx; // mm per px

    const lTemple = p(LM.leftTemple), rTemple = p(LM.rightTemple);
    const faceWidthPx = dist(lTemple, rTemple);
    if (faceWidthPx <= 0) return null;

    const faceWidthMm = faceWidthPx * scale; // now a real, person-specific measurement

    const lIris = p(LM.leftIris), rIris = p(LM.rightIris);
    const pdMm = dist(lIris, rIris) * scale;

    const lInner = p(LM.leftInnerEye), rInner = p(LM.rightInnerEye);
    const bridgeWidthMm = dist(lInner, rInner) * scale;

    const noseTip = p(LM.noseTip);
    const bridgeMidY = (lInner.y + rInner.y) / 2;
    const bridgeHeightMm = Math.abs(noseTip.y - bridgeMidY) * scale + BRIDGE_HEIGHT_OFFSET;

    return {
      faceWidthPx, scale, faceWidthMm, pdMm, bridgeWidthMm, bridgeHeightMm,
    };
  }

  // ---- Capture state machine ----
  const STEPS = [
    { key: "frontal", instruction: "Look straight at the camera. Hold still.", arrow: null,    needFrontal: true },
    { key: "left",    instruction: "Slowly turn your head left",              arrow: "left",   needFrontal: false },
    { key: "right",   instruction: "Slowly turn your head right",             arrow: "right",  needFrontal: false },
  ];

  const state = {
    phase: "idle",          // idle | aligning | capturing | done
    stepIndex: 0,
    frames: [],             // collected measureFrame results for current step
    bboxes: [],             // bbox areas parallel to a raw buffer
    rawBuffer: [],          // { meas, bbox } pending validation
    lastFaceTime: 0,
    stepResults: [],        // averaged result per step
  };

  function setDots() {
    for (let i = 0; i < dots.length; i++) {
      dots[i].className = "dot" +
        (i < state.stepIndex ? " done" : i === state.stepIndex ? " active" : "");
    }
  }

  function startStep(i) {
    state.stepIndex = i;
    state.phase = "aligning";
    state.rawBuffer = [];
    const step = STEPS[i];
    instruction.textContent = step.instruction;
    progressLabel.innerHTML = "&nbsp;";
    trackFill.style.width = "0%";
    arrowLeft.style.display  = step.arrow === "left"  ? "block" : "none";
    arrowRight.style.display = step.arrow === "right" ? "block" : "none";
    setDots();
  }

  function alignedForStep(landmarks, w) {
    const step = STEPS[state.stepIndex];
    const ratio = turnRatio(landmarks, w);
    if (step.key === "frontal") return ratio > 0.7;      // roughly symmetric
    return ratio < 0.55;                                  // clearly turned (~45°)
  }

  function finishStep() {
    // validate buffer: discard frames whose bbox deviates >15% from median
    const buf = state.rawBuffer;
    const areas = buf.map((b) => b.bbox);
    const med = median(areas);
    const kept = buf.filter((b) => Math.abs(b.bbox - med) / med <= BBOX_TOLERANCE);
    const discarded = buf.length - kept.length;

    const avg = (sel) => kept.reduce((s, b) => s + sel(b.meas), 0) / kept.length;
    const result = {
      step: STEPS[state.stepIndex].key,
      faceWidthMm: avg((m) => m.faceWidthMm),
      pdMm: avg((m) => m.pdMm),
      bridgeWidthMm: avg((m) => m.bridgeWidthMm),
      bridgeHeightMm: avg((m) => m.bridgeHeightMm),
      scale: avg((m) => m.scale),
      kept: kept.length,
      discarded,
    };
    state.stepResults.push(result);

    if (state.stepIndex < STEPS.length - 1) {
      startStep(state.stepIndex + 1);
    } else {
      state.phase = "done";
      finalize();
    }
  }

  // ---- Frame validity (range gate) ----
  function inRange(meas) {
    // Brief: discard frame as invalid if face width is out of plausible range.
    if (meas.faceWidthMm < 100 || meas.faceWidthMm > 200) return false;
    // Additional sanity gates that signal a bad detection.
    if (meas.pdMm < 40 || meas.pdMm > 90) return false;
    if (meas.bridgeWidthMm < 8 || meas.bridgeWidthMm > 40) return false;
    return true;
  }

  // ---- MediaPipe results callback ----
  function onResults(results) {
    const w = overlay.width, h = overlay.height;
    ctx.clearRect(0, 0, w, h);

    const has = results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0;

    if (!has) {
      oval.classList.add("lost");
      if (state.phase === "aligning" || state.phase === "idle") {
        instruction.textContent = "Move your face into the frame";
      }
      if (Date.now() - state.lastFaceTime > FACE_DETECT_TIMEOUT_MS && state.lastFaceTime) {
        instruction.textContent = "Can't find your face. Try better lighting or move closer.";
      }
      return;
    }

    oval.classList.remove("lost");
    state.lastFaceTime = Date.now();
    const landmarks = results.multiFaceLandmarks[0];

    drawMesh(landmarks, w, h);

    const meas = measureFrame(landmarks, w, h);
    if (!meas || !inRange(meas)) return;

    if (state.phase === "idle") {
      // first detection on setup screen → begin frontal step
      startStep(0);
    }

    if (state.phase === "aligning") {
      const step = STEPS[state.stepIndex];
      if (alignedForStep(landmarks, w)) {
        instruction.textContent = step.key === "frontal"
          ? "Hold still…" : "Hold still…";
        state.phase = "capturing";
      } else {
        instruction.textContent = step.instruction;
      }
    }

    if (state.phase === "capturing") {
      const bbox = bboxArea(landmarks, w, h);
      state.rawBuffer.push({ meas, bbox });
      const n = state.rawBuffer.length;
      progressLabel.textContent = `Measuring… ${Math.min(n, FRAMES_PER_STEP)}/${FRAMES_PER_STEP}`;
      trackFill.style.width = `${Math.min(100, (n / FRAMES_PER_STEP) * 100)}%`;

      if (n >= FRAMES_PER_STEP) {
        finishStep();
      }
    }

    if (DEBUG) renderDebug(landmarks, w, h, meas);
  }

  // subtle mesh: draw the 6 key landmarks + light point cloud
  function drawMesh(landmarks, w, h) {
    ctx.save();
    ctx.fillStyle = "rgba(184,150,62,0.25)";
    for (let i = 0; i < landmarks.length; i += 3) {
      const x = landmarks[i].x * w, y = landmarks[i].y * h;
      ctx.fillRect(x, y, 1, 1);
    }
    // key points
    ctx.fillStyle = "rgba(184,150,62,0.95)";
    for (const idx of Object.values(LM)) {
      const lm = landmarks[idx];
      if (!lm) continue;
      ctx.beginPath();
      ctx.arc(lm.x * w, lm.y * h, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function renderDebug(landmarks, w, h, meas) {
    const fmt = (n) => n.toFixed(2);
    const keyPts = Object.entries(LM).map(([name, idx]) => {
      const lm = landmarks[idx];
      return `  ${name} [${idx}]: ${lm ? `${fmt(lm.x * w)}, ${fmt(lm.y * h)}` : "n/a"}`;
    }).join("\n");
    const buf = state.rawBuffer;
    debugBox.textContent =
`step: ${STEPS[state.stepIndex].key}  phase: ${state.phase}
turnRatio: ${fmt(turnRatio(landmarks, w))}
irisDiameterPx: ${fmt(irisDiameterPx(landmarks, w, h))}
scale (mm/px): ${meas.scale.toFixed(4)}
faceWidthPx: ${fmt(meas.faceWidthPx)}
--- live mm ---
  face width:    ${fmt(meas.faceWidthMm)}
  PD:            ${fmt(meas.pdMm)}
  bridge width:  ${fmt(meas.bridgeWidthMm)}
  bridge height: ${fmt(meas.bridgeHeightMm)}
--- buffer ---
  collected: ${buf.length}/${FRAMES_PER_STEP}
--- key landmarks (px) ---
${keyPts}`;
  }

  // ---- Final aggregation + recommendation ----
  function finalize() {
    const frontal = state.stepResults.find((r) => r.step === "frontal");
    // face width averaged across all three angles
    const faceWidthMm =
      state.stepResults.reduce((s, r) => s + r.faceWidthMm, 0) / state.stepResults.length;

    const final = {
      faceWidthMm,
      pdMm: frontal.pdMm,
      bridgeWidthMm: frontal.bridgeWidthMm,
      bridgeHeightMm: frontal.bridgeHeightMm,
    };
    renderResults(final);
    showScreen("results");
    stopCamera();
  }

  function frameSize(mm) {
    if (mm < 125) return "XS";
    if (mm <= 130) return "XS";
    if (mm <= 136) return "S";
    if (mm <= 142) return "M";
    if (mm <= 148) return "L";
    if (mm <= 154) return "XL";
    return "XXL";
  }
  function bridgeSize(mm) {
    if (mm < 19) return "Narrow";
    if (mm <= 21) return "Medium";
    return "Wide";
  }
  function pdClass(mm) {
    if (mm < 60) return "Narrow — monocular PD adjustment recommended";
    if (mm <= 64) return "Standard";
    if (mm <= 70) return "Wide";
    return "Extra wide";
  }

  function renderResults(f) {
    const round = (n) => Math.round(n);
    const grid = el("results-grid");
    const rows = [
      ["Face width",   `${round(f.faceWidthMm)}mm`],
      ["PD",           `${round(f.pdMm)}mm`],
      ["Bridge width", `${round(f.bridgeWidthMm)}mm`],
      ["Bridge height",`${round(f.bridgeHeightMm)}mm`],
    ];
    grid.innerHTML = rows.map(
      ([l, v]) => `<div class="label">${l}</div><div class="value">${v}</div>`
    ).join("");

    const size = frameSize(f.faceWidthMm);
    const bridge = bridgeSize(f.bridgeWidthMm);
    const pd = pdClass(f.pdMm).split(" — ")[0];
    el("reco").innerHTML =
      `Size ${size} · ${bridge} bridge · ${pd} PD` +
      `<span class="sub">${pdClass(f.pdMm)}</span>`;

    if (DEBUG) {
      const db = el("debug-results");
      db.classList.add("on");
      db.innerHTML = "<pre style='white-space:pre-wrap;font-size:11px'>" +
        JSON.stringify({ final: f, perStep: state.stepResults }, null, 2) + "</pre>";
    }
  }

  // ---- Camera + MediaPipe lifecycle ----
  let faceMesh = null;
  let camera = null;
  let loadTimeout = null;

  function sizeCanvas() {
    const stage = el("stage");
    overlay.width = stage.clientWidth;
    overlay.height = stage.clientHeight;
  }

  async function startScan() {
    showScreen("capture");
    sizeCanvas();
    window.addEventListener("resize", sizeCanvas);

    if (typeof FaceMesh === "undefined" || typeof Camera === "undefined") {
      fatal("Failed to load. Check your connection and refresh.");
      return;
    }

    // reset state
    state.phase = "idle";
    state.stepIndex = 0;
    state.rawBuffer = [];
    state.stepResults = [];
    state.lastFaceTime = 0;
    instruction.textContent = "Position your face in the frame";

    try {
      faceMesh = new FaceMesh({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
      });
      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,        // iris landmarks for PD
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });
      faceMesh.onResults(onResults);

      // guard: if nothing loads within 12s, surface a load error
      loadTimeout = setTimeout(() => {
        if (!state.lastFaceTime && state.phase === "idle") {
          // could be model load failure or just no face yet — only fail hard
          // if the camera never produced frames.
        }
      }, 12000);

      camera = new Camera(videoEl, {
        onFrame: async () => {
          await faceMesh.send({ image: videoEl });
        },
        width: 720,
        height: 960,
        facingMode: "user",
      });
      await camera.start();
    } catch (err) {
      handleCameraError(err);
    }
  }

  function handleCameraError(err) {
    const name = err && err.name;
    if (name === "NotAllowedError" || name === "SecurityError") {
      fatal("Camera access is required. Please allow access in your browser settings.");
    } else if (name === "NotFoundError" || name === "NotReadableError") {
      fatal("No camera available. Check your device and refresh.");
    } else {
      fatal("Failed to load. Check your connection and refresh.");
    }
  }

  function stopCamera() {
    try {
      if (camera) camera.stop();
      const stream = videoEl.srcObject;
      if (stream) stream.getTracks().forEach((t) => t.stop());
      videoEl.srcObject = null;
    } catch (e) { /* noop */ }
    if (loadTimeout) clearTimeout(loadTimeout);
  }

  // mirror the overlay to match the mirrored 'user' camera feel
  overlay.style.transform = "scaleX(-1)";

  // ---- Wire up ----
  el("btn-start").addEventListener("click", startScan);
  el("btn-again").addEventListener("click", () => {
    showScreen("welcome");
  });
  el("btn-retry").addEventListener("click", () => location.reload());

  // catch script-load failures early
  window.addEventListener("error", (e) => {
    if (e && e.target && e.target.tagName === "SCRIPT") {
      fatal("Failed to load. Check your connection and refresh.");
    }
  }, true);

})();
</script>
</body>
</html>
